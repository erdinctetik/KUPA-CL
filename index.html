<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şampiyonlar Ligi Tahmin Aracı</title>
    <style>
        :root {
            --bg-color: #030a24;
            --box-bg: #0a195c;
            --box-border: #1a369d;
            --hover-color: #1e40af;
            --selected-color: #3b82f6;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-style: italic;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
            backdrop-filter: blur(5px);
            flex-wrap: wrap;
            justify-content: center;
        }

        input, select, button {
            padding: 10px 15px;
            border-radius: 5px;
            border: none;
            font-size: 14px;
        }

        button {
            background-color: var(--selected-color);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { background-color: #2563eb; }

        .bracket-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 15px;
            flex: 1;
            position: relative;
        }

        .match {
            background-color: var(--box-bg);
            border: 2px solid var(--box-border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        /* --- YOL HARİTASI ÇİZGİLERİ (SOL KANAT) --- */
        .column:nth-child(1) .match::after,
        .column:nth-child(2) .match::after,
        .column:nth-child(3) .match:not(.champion-box)::after {
            content: '';
            position: absolute;
            right: -20px;
            top: 50%;
            width: 20px;
            height: 2px;
            background-color: var(--selected-color);
            opacity: 0.6;
            z-index: 1;
        }

        /* --- YOL HARİTASI ÇİZGİLERİ (SAĞ KANAT) --- */
        .column:nth-child(5) .match:not(.champion-box)::before,
        .column:nth-child(6) .match::before,
        .column:nth-child(7) .match::before {
            content: '';
            position: absolute;
            left: -20px;
            top: 50%;
            width: 20px;
            height: 2px;
            background-color: var(--selected-color);
            opacity: 0.6;
            z-index: 1;
        }

        .team {
            padding: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .team:last-child { border-bottom: none; }
        .team:hover { background-color: var(--hover-color); }
        .team.selected { background-color: var(--selected-color); }
        
        .empty-slot { color: #64748b; font-style: italic; }

        .center-column {
            flex: 1.5;
            align-items: center;
            display: flex;
            flex-direction: column;
        }

        .champion-box {
            background: linear-gradient(45deg, #ffd700, #ffb300);
            color: #000;
            border: none;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            transform: scale(1.1);
            margin-top: 20px;
            width: 100%;
        }
        
        .round-title { 
            text-align: center; 
            font-size: 14px; 
            font-weight: bold; 
            color: #94a3b8; 
            margin-bottom: 5px; 
        }

        .trophy-img {
            width: 140px;
            margin-top: 30px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
        }

        .delete-section {
            display: none;
            align-items: center;
            gap: 10px;
            background: rgba(239, 68, 68, 0.2);
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Road to Budapest 26</h1>

    <div class="controls">
        <input type="text" id="username" placeholder="İsmini yaz...">
        <button onclick="savePrediction()">Tahmini Kaydet</button>
        <span style="color: #94a3b8;">|</span>
        <select id="userSelect" onchange="loadPrediction()">
            <option value="">Kayıtlı Tahminlere Bak</option>
        </select>
        
        <button onclick="toggleDeleteBox()" style="background-color: #475569;">Kayıt Sil</button>
        
        <div class="delete-section" id="deleteBox">
            <input type="password" id="deletePass" placeholder="Şifre" style="width: 70px;">
            <button onclick="deleteSelected()" style="background-color: #ef4444;">Seçili Olanı Sil</button>
        </div>
    </div>

    <div class="bracket-container" id="bracket">
        </div>

    <script>
        // R16 (Son 16) Takımları
        const initialTeams = {
            left: [
                ["PSG", "Chelsea"],
                ["Galatasaray", "Liverpool"], 
                ["Real Madrid", "Man City"],
                ["Atalanta", "Bayern Munich"]
            ],
            right: [
                ["Newcastle", "Barcelona"],
                ["Atletico Madrid", "Tottenham"],
                ["Sporting CP", "Bodo"],
                ["Arsenal", "Leverkusen"]
            ]
        };

        // Mevcut tahmin durumu (State)
        let predictions = {
            qf: { left: ["", "", "", ""], right: ["", "", "", ""] }, 
            sf: { left: ["", ""], right: ["", ""] }, 
            final: ["", ""], 
            champion: "" 
        };

        let savedUsers = JSON.parse(localStorage.getItem('cl_predictions')) || {};

        function init() {
            renderBracket();
            updateUserDropdown();
        }

        function renderBracket() {
            const container = document.getElementById('bracket');
            container.innerHTML = `
                <div class="column">
                    <div class="round-title">SON 16</div>
                    ${renderMatches(initialTeams.left, 'r16', 'left')}
                </div>
                <div class="column">
                    <div class="round-title">ÇEYREK FİNAL</div>
                    ${renderSlots(predictions.qf.left, 'qf', 'left', 'sf')}
                </div>
                <div class="column">
                    <div class="round-title">YARI FİNAL</div>
                    ${renderSlots(predictions.sf.left, 'sf', 'left', 'final')}
                </div>

                <div class="column center-column">
                    <div class="round-title">FİNAL</div>
                    <div class="match">
                        <div class="team ${predictions.champion === predictions.final[0] && predictions.champion ? 'selected' : ''} ${!predictions.final[0] ? 'empty-slot' : ''}" 
                             onclick="advance(this, '${predictions.final[0]}', 'final', 'left', 0, 'champion')">
                            ${predictions.final[0] || "Finalist 1"}
                        </div>
                        <div class="team ${predictions.champion === predictions.final[1] && predictions.champion ? 'selected' : ''} ${!predictions.final[1] ? 'empty-slot' : ''}" 
                             onclick="advance(this, '${predictions.final[1]}', 'final', 'right', 1, 'champion')">
                            ${predictions.final[1] || "Finalist 2"}
                        </div>
                    </div>
                    
                    <div class="round-title" style="margin-top: 30px; color: #ffd700;">ŞAMPİYON</div>
                    <div class="match champion-box">
                        <div class="team ${!predictions.champion ? 'empty-slot' : ''}">
                            ${predictions.champion || "Şampiyon"}
                        </div>
                    </div>

                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNCGwErszDRbr04Wtfb1WMXbDUzze9zdWcShRnrH97kQ&s" alt="Şampiyonlar Ligi Kupası" class="trophy-img">
                </div>

                <div class="column">
                    <div class="round-title">YARI FİNAL</div>
                    ${renderSlots(predictions.sf.right, 'sf', 'right', 'final')}
                </div>
                <div class="column">
                    <div class="round-title">ÇEYREK FİNAL</div>
                    ${renderSlots(predictions.qf.right, 'qf', 'right', 'sf')}
                </div>
                <div class="column">
                    <div class="round-title">SON 16</div>
                    ${renderMatches(initialTeams.right, 'r16', 'right')}
                </div>
            `;
        }

        function renderMatches(matches, currentRound, side) {
            return matches.map((match, index) => {
                const nextRound = 'qf';
                const isT1Selected = predictions[nextRound][side][index] === match[0];
                const isT2Selected = predictions[nextRound][side][index] === match[1];

                return `
                <div class="match">
                    <div class="team ${isT1Selected ? 'selected' : ''}" onclick="advance(this, '${match[0]}', '${currentRound}', '${side}', ${index}, '${nextRound}')">${match[0]}</div>
                    <div class="team ${isT2Selected ? 'selected' : ''}" onclick="advance(this, '${match[1]}', '${currentRound}', '${side}', ${index}, '${nextRound}')">${match[1]}</div>
                </div>`;
            }).join('');
        }

        function renderSlots(slots, currentRound, side, nextRound) {
            let html = '';
            for (let i = 0; i < slots.length; i += 2) {
                const t1 = slots[i];
                const t2 = slots[i+1];
                
                let isT1Selected = false;
                let isT2Selected = false;
                
                if (nextRound === 'final') {
                    const finalIndex = side === 'left' ? 0 : 1;
                    isT1Selected = predictions.final[finalIndex] === t1 && t1 !== "";
                    isT2Selected = predictions.final[finalIndex] === t2 && t2 !== "";
                } else {
                    const nextIndex = Math.floor(i / 2);
                    isT1Selected = predictions[nextRound][side][nextIndex] === t1 && t1 !== "";
                    isT2Selected = predictions[nextRound][side][nextIndex] === t2 && t2 !== "";
                }

                html += `
                <div class="match">
                    <div class="team ${isT1Selected ? 'selected' : ''} ${!t1 ? 'empty-slot' : ''}" 
                         onclick="advance(this, '${t1}', '${currentRound}', '${side}', ${i}, '${nextRound}')">${t1 || "?"}</div>
                    <div class="team ${isT2Selected ? 'selected' : ''} ${!t2 ? 'empty-slot' : ''}" 
                         onclick="advance(this, '${t2}', '${currentRound}', '${side}', ${i+1}, '${nextRound}')">${t2 || "?"}</div>
                </div>`;
            }
            return html;
        }

        function advance(element, teamName, currentRound, side, index, nextRound) {
            if (!teamName || teamName === "?") return;

            if (nextRound === 'champion') {
                predictions.champion = teamName;
            } else if (nextRound === 'final') {
                const finalIndex = side === 'left' ? 0 : 1;
                predictions.final[finalIndex] = teamName;
                if (predictions.champion && predictions.champion !== teamName && predictions.champion !== predictions.final[1 - finalIndex]) {
                    predictions.champion = "";
                }
            } else {
                let targetIndex;
                if(currentRound === 'r16') {
                    targetIndex = index;
                } else {
                    targetIndex = Math.floor(index / 2);
                }

                predictions[nextRound][side][targetIndex] = teamName;
                clearForward(nextRound, side, targetIndex);
            }
            renderBracket();
        }

        function clearForward(startRound, side, index) {
            if (startRound === 'qf') {
                const sfIndex = Math.floor(index / 2);
                predictions.sf[side][sfIndex] = "";
                predictions.final[side === 'left' ? 0 : 1] = "";
                predictions.champion = "";
            } else if (startRound === 'sf') {
                predictions.final[side === 'left' ? 0 : 1] = "";
                predictions.champion = "";
            }
        }

        function savePrediction() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                alert('Lütfen kaydetmeden önce bir isim girin!');
                return;
            }
            savedUsers[username] = JSON.parse(JSON.stringify(predictions));
            localStorage.setItem('cl_predictions', JSON.stringify(savedUsers));
            updateUserDropdown();
            alert(username + ' için tahminler başarıyla kaydedildi!');
        }

        function loadPrediction() {
            const select = document.getElementById('userSelect');
            const username = select.value;
            if (username && savedUsers[username]) {
                document.getElementById('username').value = username;
                predictions = JSON.parse(JSON.stringify(savedUsers[username]));
                renderBracket();
            } else {
                // Seçim temizlenirse ekranı da sıfırla
                document.getElementById('username').value = "";
                predictions = { qf: { left: ["", "", "", ""], right: ["", "", "", ""] }, sf: { left: ["", ""], right: ["", ""] }, final: ["", ""], champion: "" };
                renderBracket();
            }
        }

        function updateUserDropdown() {
            const select = document.getElementById('userSelect');
            select.innerHTML = '<option value="">Kayıtlı Tahminlere Bak</option>';
            for (let user in savedUsers) {
                select.innerHTML += `<option value="${user}">${user}</option>`;
            }
        }

        // --- SİLME İŞLEMİ FONKSİYONLARI ---
        function toggleDeleteBox() {
            const box = document.getElementById('deleteBox');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        function deleteSelected() {
            const select = document.getElementById('userSelect');
            const username = select.value;
            const pass = document.getElementById('deletePass').value;

            // ŞİFRE KONTROLÜ (Buradaki 1234 yazısını istediğin bir şifreyle değiştirebilirsin)
            if (pass !== '1234') {
                alert('Hatalı şifre girdiniz!');
                return;
            }

            if (!username) {
                alert('Lütfen silmek için açılır listeden bir kayıt seçin!');
                return;
            }

            if(confirm(username + ' adlı kullanıcının tahmini silinecek. Emin misin?')) {
                delete savedUsers[username];
                localStorage.setItem('cl_predictions', JSON.stringify(savedUsers));
                
                // Ekranı sıfırla ve listeyi güncelle
                updateUserDropdown();
                document.getElementById('username').value = "";
                document.getElementById('deletePass').value = "";
                toggleDeleteBox();
                
                predictions = { qf: { left: ["", "", "", ""], right: ["", "", "", ""] }, sf: { left: ["", ""], right: ["", ""] }, final: ["", ""], champion: "" };
                renderBracket();
                
                alert('Kayıt başarıyla silindi.');
            }
        }

        init();
    </script>
</body>

</html>
